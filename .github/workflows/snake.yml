name: Generate Snake Animation

on:
  # Mise à jour quotidienne à minuit (UTC)
  schedule:
    - cron: "0 0 * * *"
  # Bouton "Run workflow" manuel
  workflow_dispatch:
  # À chaque push sur main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate snake SVG (dark / violet)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=6355D8&color_dots=05050D,3a2f6b,6355d8,8b7fe8,b8aef5

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
